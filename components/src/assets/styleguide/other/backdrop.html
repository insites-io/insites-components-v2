<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Insites Components - Backdrop</title>

<!-- Insites Essentials -->
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;1,400;1,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/insites-font-icons.css" />
  <link rel="stylesheet" href="/assets/css/insites.css" />

  <script type="module" src="/build/insites.esm.js"></script>
  <script nomodule src="/build/insites.js"></script>

  <!-- Documention Styleguide CSS -->
  <link rel="stylesheet" href="/assets/prism/prism.css">
  <script src="/assets/prism/prism.js"></script>

  <link rel="stylesheet" href="/assets/css/styleguide.css">
  <style>
    .ins-styleguide-actual-slot-wrap { position: relative; }
    .ins-styleguide-wrap .ins-backdrop-wrap {
      position: absolute;
    }
    ins-backdrop div { position: relative; z-index: 9999; }
  </style>
</head>

<body>
  <div>
    <h2 class="section-title">Insites Backdrop Tag</h2>
    <p>Creates an overlay to hold other components. </p>
    <h2 class="section-title">Complete Example</h2>

    <div class="ins-styleguide-wrap">
      <div class="ins-styleguide-cont">
        <div class="ins-styleguide-actual-slot-wrap" style="overflow: hidden; position: relative;">
          <ins-backdrop></ins-backdrop>
        </div>
        <div class="ins-styleguide-code-slot-wrap">
          <script type="text/plain" class="language-markup">
<ins-backdrop></ins-backdrop>
          </script>
        </div>
      </div>
    </div>
  </div>
  <!-- ins-backdrop attribute table -->
  <div>
    <h2 class="section-title">Attributes</h2>
    <div class="table-style">
      <table>
        <tr>
          <th>FIELD ATTRIBUTE</th>
          <th>TYPE</th>
          <th>DEFAULT</th>
          <th>OPTIONS</th>
          <th>DESCRIPTION</th>
        </tr>
        <tr>
          <td>light</td>
          <td>boolean</td>
          <td>false</td>
          <td>true, false</td>
          <td>Set backdrop color style to light / white.</td>
        </tr>
      </table>
    </div>
  </div>

  <div>
    <h2 class="section-title">States</h2>
    <!-- Default State -->
    <div class="ins-styleguide-wrap">
      <div class="ins-styleguide-label-wrap">Default State</div>
      <div class="ins-styleguide-cont">
        <div class="ins-styleguide-actual-slot-wrap">
          <ins-button solid label="Element Behind"></ins-button>
          <ins-backdrop>
            <div>
              <h3>Hello World</h3>
            </div>
          </ins-backdrop>
        </div>
        <div class="ins-styleguide-code-slot-wrap">
          <script type="text/plain" class="language-markup">
<ins-button solid label="Element Behind"></ins-button>
<ins-backdrop>
  <div>
    <h3>Hello World</h3>
  </div>
</ins-backdrop>
<style>
  ins-backdrop div { position: relative; z-index: 9999; }
</style>
          </script>
        </div>
      </div>
    </div>
    <!-- Light State -->
    <div class="ins-styleguide-wrap">
      <div class="ins-styleguide-label-wrap">Light State</div>
      <div class="ins-styleguide-cont">
        <div class="ins-styleguide-actual-slot-wrap">
          <ins-button solid label="Element Behind"></ins-button>
          <ins-backdrop light>
            <div>
              <h3>Hello World</h3>
            </div>
          </ins-backdrop>
        </div>
        <div class="ins-styleguide-code-slot-wrap">
          <script type="text/plain" class="language-markup">
<ins-button solid label="Element Behind"></ins-button>
<ins-backdrop light>
  <div>
    <h3>Hello World</h3>
  </div>
</ins-backdrop>
<style>
  ins-backdrop div { position: relative; z-index: 9999; }
</style>
            </script>
        </div>
      </div>
    </div>

</div>
<!-- end states -->


</body>

</html>
