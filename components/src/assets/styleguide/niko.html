<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Insites Components - QA</title>

  <!-- Insites Essentials -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap">
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/insites-font-icons.css" />
  <link rel="stylesheet" href="/assets/css/insites.css" />

  <script type="module" src="/build/insites.esm.js"></script>
  <script nomodule src="/build/insites.js"></script>

  <!-- jQuery library -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js"
    integrity="sha256-ZosEbRLbNQzLpnKIkEdrPv7lOy9C27hHQ+Xp8a4MxAQ="
    crossorigin="anonymous">
  </script>

  <style>
    body {
      font-family: 'Open Sans', Arial, Helvetica, sans-serif;
      padding: 20px
    }
  </style>
</head>

<body>
  <ins-editor label="Test" has-code-editor></ins-editor>
  <div class="col-6">
    <ins-select id="testEl" label="test">
      <div id="dynamicOptions">
        <ins-select-option label="Test 1" value="Test 1"></ins-select-option>
        <ins-select-option label="Test 2" value="Test 2"></ins-select-option>
        <ins-select-option label="Test 3" value="Test 3"></ins-select-option>
        <ins-select-option label="Test 4" value="Test 4"></ins-select-option>
        <ins-select-option label="Test 5" value="Test 5"></ins-select-option>
      </div>
    </ins-select>
  </div>

  <script>
    function loadDynamicOptions(){
      var slotWrap = document.getElementById('dynamicOptions');
      slotWrap.innerHTML = "";
      for (i = 0; i < 5; i++){
        var option = document.createElement('ins-select-option');
        option.label = `Test Dynamic ${i}`;
        option.value = `Test Dynamic ${i}`;
        slotWrap.appendChild(option);
      }
      testEl.setLoadingState(false);
      testEl.setSearchingState(false);
      testEl.updateSelectedOptions();
    }

    function loadStaticOptions(){
      var slotWrap = document.getElementById('dynamicOptions');
      slotWrap.innerHTML = "";
      for (i = 0; i < 20; i++){
        var option = document.createElement('ins-select-option');
        option.label = `Test ${i}`;
        option.value = `Test ${i}`;
        slotWrap.appendChild(option);
      }
      testEl.setLoadingState(false);
      testEl.setSearchingState(false);
      testEl.updateSelectedOptions();
    }

    testEl.addEventListener('loadMore', console.log);
    testEl.addEventListener('onOptionSelect', e => console.log(e.detail));
    testEl.addEventListener('insClose', () => console.log('closed'));
    testEl.addEventListener('onSearch', e => {
      if (e.detail) loadDynamicOptions();
      else loadStaticOptions();
    });
  </script>
</body>

</html>
