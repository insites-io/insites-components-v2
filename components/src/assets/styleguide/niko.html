<html lang="en">

<head>

  <!-- Insites Essentials -->

  <style>
    body {
      font-family: 'Open Sans', Arial, Helvetica, sans-serif;
      padding: 20px
    }

    .spacer {
      padding: 200px;
    }

    .grid {
      float: left;
      width: 49%;
      box-sizing: border-box;
    }

    .img-wrap {

    }

    .content-wrap {
      width: 600px;
      margin: 0 auto;

<body>
  <div class="content-wrap">
    <ins-carousel layout="1" autoplay autostop loop

      <div id="myCarousel">
        <div class="img-wrap">
          <img src="/assets/images/slider/1.jpeg" alt="sliders" />
        </div>

        <div class="img-wrap">
          <img src="/assets/images/slider/2.jpeg" alt="sliders" />
        </div>

        <div class="img-wrap">
          <img src="/assets/images/slider/3.jpeg" alt="sliders" />
        </div>
      </div>

    </ins-carousel>
  </div>
