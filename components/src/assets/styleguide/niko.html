<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">

  <!-- Insites Essentials -->

  <script type="module" src="/build/insites.esm.js"></script>

  <style>
    .liquid-label {
      font-size: 12px;
      font-weight: 600;

<body>

  <ins-input-file 
    id="myEl"
    label="Test File">
  </ins-input-file>

  <script>
    var myEl = document.getElementById('myEl');

    async function setFiles(){
      await myEl.setFiles([
        {
          id: '123',
          name: 'Sample.jpg',
          type: 'jpeg',
          url: 'https://uploads.staging.oregon.platform-os.com/instances/5872/property_uploads/modules/ins_database/db_file/input_file/d8b98924-2194-48bf-9d26-c3570c3cb3fb/sample.pdf'
        }
      ]);
    }

    setTimeout(() => {
      setFiles();
    }, 2000)
  </script>

</body>
