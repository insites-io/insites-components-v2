    window.onload = () => {
      let el = document.getElementById('ins-input-select');

      el.addEventListener('insDynamicSubmit', () => {
        el.dynamicHasError = !el.dynamicValue;

          el.dynamicCloseOptions();

      });

      el.infiniteScroll = true;
    };
