<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Insites Components - QA</title>

  <!-- Insites Essentials -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap">
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/insites-font-icons.css" />
  <link rel="stylesheet" href="/assets/css/insites.css" />

  <script type="module" src="/build/insites.esm.js"></script>
  <script nomodule src="/build/insites.js"></script>
</head>

<body>
  <ins-sidebar>
    <ins-sidebar-item label="Route 1" link="#/route-1" icon="icon-zap"></ins-sidebar-item>
    <ins-sidebar-item label="Route 2" link="#/route-2" icon="icon-codepen"></ins-sidebar-item>

    <ins-sidebar-item label="Route 3" with-submenu icon="icon-github">
      <ins-sidebar-item label="Route 4" link="#/route-4"></ins-sidebar-item>
      <ins-sidebar-item label="Route 5" link="#/route-5"></ins-sidebar-item>
    </ins-sidebar-item>

    <ins-sidebar-item label="Route 6 - iframe" landing-page
      link="/assets/styleguide/test.html" app icon="icon-chrome">
    </ins-sidebar-item>


    <ins-sidebar-footer class="side-bar-footer">

      <ins-sidebar-footer-button id="toggleMenuButton" icon="icon-menu-collapse">
      </ins-sidebar-footer-button>

    </ins-sidebar-footer>
  </ins-sidebar>

  <ins-header support-link="www.google.com" id="insMenuBar">
    <ins-header-user name="John Smith" logout-link="/" profile-link="#/my-profile">
    </ins-header-user>
  </ins-header>

  <ins-renderer>
    <div>
      <ins-filter with-date-filter>
        <ins-filter-item name="Operating System" options='["Windows", "macOS", "Linux"]'></ins-filter-item>
      </ins-filter>

      <ins-input tooltip="Testing built in tooltip for this component." label="Test"></ins-input>
      <ins-tooltip
        label="?"
        shape="circle"
        position="top"
        trigger="click"
        content="Testing built in tooltip for this component.">
      </ins-tooltip>
    </div>
  </ins-renderer>


  <script>

    // Menu Toggle
    var menuBtn = document.getElementById("toggleMenuButton");
    var menuBar = document.getElementById("insMenuBar");
    var body = document.querySelector("body");

    if (menuBtn && menuBar) {
      menuBtn.addEventListener('insSidebarFooterButtonEvent', function () { toggleMenu() });
    }
    function toggleMenu() {
      if (body.classList.contains('mini')) {
        menuBtn.icon = 'icon-menu-collapse';
      } else {
        menuBtn.icon = 'icon-menu-expand';
      }
      menuBar.toggleSidebar();
    }
  </script>
</body>

</html>
