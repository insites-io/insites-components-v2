<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Insites Components - Vue QA</title>

  <!-- Insites Essentials -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap">
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/insites-font-icons.css" />
  <link rel="stylesheet" href="/assets/css/foundation.min.css" />
  <link rel="stylesheet" href="/assets/css/insites.css" />

  <script type="module" src="/build/insites.esm.js"></script>
  <script nomodule src="/build/insites.js"></script>

  <style>body{ font-family: 'Open Sans', Arial, Helvetica, sans-serif; padding:20px }</style>
</head>

<body>
  <div id="app">

    <insites-checkbox
      id="testEl"
      label="test"
      v-model="message">
    </insites-checkbox>

    {{ message }}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <script src="/assets/js/insites-components-vue-wrapper.js"></script>

  <script>
    var app = new Vue({
      el: '#app',
      data(){
        return {
          message:"Hello World!"
        }
      },
      methods: {},
      mounted(){}
    });
  </script>
</body>

</html>
