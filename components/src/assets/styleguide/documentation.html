  <ins-renderer>

    <ins-table
  id="insBaseTable"
  heading="Table"
  search bar-placeholder="Search..."
  tooltip="This is a sample tooltip content. It also support html content.">
</ins-table>

<script>
  var insBaseTable = document.getElementById('insBaseTable');
  var rawData = [];
  var filteredData = [];
  var displayedData = [];
  var tableHeaders = [];
  var totalCount = 0;
  var pageNumber = 1;
  var pageSize = 10;
  var searchKeyword = '';
  var sortedKeyword = '';
  insBaseTable.loadingScreen = true;
  insBaseTable.bulkActions = ['Archive'];
  insBaseTable.rowActions = ['Archive'];
  insBaseTable.addEventListener('insPaginationChange', tablePaginationHandler);
  insBaseTable.addEventListener('insTableSearch', tableSearchHandler);
  insBaseTable.addEventListener('insTableSort', tableSortHandler);
  insBaseTable.addEventListener('insTableBulkAction', tableBulkActionHandler);
  insBaseTable.addEventListener('insTableRowAction', tableRowActionHandler);

  function tablePaginationHandler(event){
    insBaseTable.loadingScreen = true;
    pageSize = event.detail.pageSize;
    pageNumber = event.detail.pageNumber;
    processTableData()
  }

  function tableSearchHandler(event){
    insBaseTable.loadingScreen = true;
    searchKeyword = event.detail.value;
    if (!searchKeyword) {
      processTableData();
      return;
    }
    filteredData = [];
    rawData.forEach((value) => {
      Object.keys(value).forEach((key) => {
        if (key === 'Default Column'){
          var match = value[key];
          if (match.toLowerCase().includes(searchKeyword.toLowerCase())) {
            filteredData.push(value);
          }
        }
      });
    });
    if (sortedKeyword && filteredData.length > 1) {
      filteredData.sort(dynamicKeySort(sortedKeyword));
    }
    insBaseTable.pageNumber = 1;
    processTableData();
    if (!filteredData.length) {
      insBaseTable.loadingScreen = true;
      insBaseTable.loaderTitle = '';
      insBaseTable.loaderMessage = 'No result found for "' + searchKeyword + '"';
      insBaseTable.loaderIcon = '';
    }
  }

  function tableSortHandler(event){
    sortedKeyword = event.detail.order === 'asc' ? event.detail.keyword : `-${event.detail.keyword}`;
    if (searchKeyword){
      filteredData.sort(dynamicKeySort(sortedKeyword));
    } else {
      rawData.sort(dynamicKeySort(sortedKeyword));
    }
    processTableData();
  }

  function tableBulkActionHandler(event){
    if (event.detail.action === 'Archive'){
      archiveSelection(event.detail.selections);
    }
  }

  function tableRowActionHandler(event){
    if (event.detail.action === 'Archive'){
      archiveItem(event.detail.data);
    }
  }

  function archiveItem(value){
    swal({
      title: '',
      // text: "Are you sure you want to delete these items",
      html: `
        <ins-loader
          state-icon="warning"
          icon-color="warning"
          state-message="Are you sure you want to archive this item?">
        </ins-loader>`,
      type: '',
      showCancelButton: true,
      confirmButtonText: 'Archive'
    }).then((result) => {
      deleteItem(value);
      processTableData();
    });
  }

  function archiveSelection(selections) {
    swal({
      title: '',
      html: `
      <ins-loader
        state-icon="warning"
        icon-color="warning"
        state-message="Are you sure you want to archive these items?">
      </ins-loader>`,
      type: '',
      showCancelButton: true,
      confirmButtonText: 'Archive'
    }).then((result) => {
      if (result.value) {
          let counter = 0;
          selections.forEach(value => {
            this.deleteItem(value);
            counter++;
            if (selections.length === counter){
              insBaseTable.resetSelections();
              processTableData()
            }
          });
        }
    });
  }

  function deleteItem(value) {
    var selectionIndex;
    var searchSelectionIndex;
    if (rawData) {
      selectionIndex = rawData.findIndex(item => {
        return item.Id === value;
      });
    }
    if (filteredData) {
      searchSelectionIndex = filteredData.findIndex(item => {
        return item.Id === value;
      });
    }
    if (selectionIndex > -1){
      rawData.splice(selectionIndex, 1);
    }
    if (searchSelectionIndex > -1){
      filteredData.splice(searchSelectionIndex, 1);
    }
  }

  function processTableData(){
    var last_index = pageNumber * pageSize;
    var first_index = (last_index - pageSize);// + 1;
    displayedData = [];
    if (searchKeyword) {
      filteredData.forEach((value, index) => {
        value['ArchiveLink'] = "#";
        if (index >= first_index && index < last_index) {
          displayedData.push(value);
        } else if (filteredData.length < pageSize){
          displayedData.push(value);
        }
      });
      insBaseTable.totalCount = filteredData.length;
    } else {
      rawData.forEach((value, index) => {
        value['ArchiveLink'] = "#";
        if (index >= first_index && index < last_index) {
          displayedData.push(value);
        }
      });
      insBaseTable.totalCount = rawData.length;
    }

    insBaseTable.tableData = displayedData;
    insBaseTable.loadingScreen = false;
  }

  function dynamicKeySort(key) {
    var OrderSortIndex = 1;
    if (key[0] === "-") {
      OrderSortIndex = -1;
      key = key.substr(1);
    }
    return function (a, b) {
      var num = (a[key] < b[key]) ? -1 : (a[key] > b[key]) ? 1 : 0;
      return num * OrderSortIndex;
    }
  }

  function fetchDataFromSrc () {
    insBaseTable.loadingScreen = true;
    insBaseTable.loaderTitle = "Processing Your Data";
    insBaseTable.loaderMessage = "Just a moment, we're fetching and processing your request.";
    insBaseTable.loaderIcon = "processing";

    // Generate 200 data entries
    const tableData = generateIncrementingData(200);

    rawData = tableData.map(function(data){
      data["Default Column_Img"] = '';
      return data;
    });

    insBaseTable.totalCount = 200;
    insBaseTable.tableHeaders = [
      { label: "Default Column", type: 'string', sortable: true, hasLink: true, hasImage: true },
      { label: "Date Column", type: 'date', sortable: true, editable: true },
      { label: "Number Column", type: 'number', sortable: true, editable: true },
      { label: "Currency Column", type: 'currency', sortable: true, editable: true }
    ];

    setTimeout(() => {
      processTableData();
    }, 3000);
  }

  function generateRandomName() {
    const firstNames = [
      "Alice", "Bob", "Charlie", "David", "Eve", "Frank", "Grace", "Heidi",
      "Ivan", "Judy", "Kevin", "Linda", "Mike", "Nancy", "Oscar", "Pamela",
      "Quinn", "Rachel", "Steve", "Tina", "Ursula", "Victor", "Wendy", "Xavier",
      "Yara", "Zack", "Amber", "Brenda", "Caleb", "Diana", "Ethan", "Fiona",
      "George", "Hannah", "Isaac", "Jasmine", "Kyle", "Lauren", "Mark", "Nora"
    ];

    const lastNames = [
      "Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis",
      "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson",
      "Thomas", "Taylor", "Moore", "Jackson", "Martin", "Lee", "Perez", "Thompson",
      "White", "Harris", "Sanchez", "Clark", "Ramirez", "Lewis", "Robinson", "Walker"
    ];

    const randomFirstName = firstNames[Math.floor(Math.random() * firstNames.length)];
    const randomLastName = lastNames[Math.floor(Math.random() * lastNames.length)];

    return `${randomFirstName} ${randomLastName}`;
  }

  function generateIncrementingData(count) {
    const generatedTableData = [];
    const startDate = new Date('2025-01-01');

    for (let i = 0; i < count; i++) {
      const currentDate = new Date(startDate);
      currentDate.setDate(startDate.getDate() + i);

      const year = currentDate.getFullYear();
      const month = String(currentDate.getMonth() + 1).padStart(2, '0');
      const day = String(currentDate.getDate()).padStart(2, '0');
      const formattedDate = `${year}-${month}-${day}`;

      const dataEntry = {
        "Default Column": generateRandomName(),
        "Date Column": formattedDate,
        "Number Column": String(i + 1),
        "Currency Column": String((i + 1) * 100)
      };

      generatedTableData.push(dataEntry);
    }

    return generatedTableData;
  }

  fetchDataFromSrc();
</script>
